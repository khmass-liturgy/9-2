<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교하성당 9-2구역 교적관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;font-size:14px}

  /* 헤더 */
  .header{background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);border-bottom:1px solid #1e40af44;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
  .header-left{display:flex;align-items:center;gap:12px}
  .header-cross{font-size:26px;color:#93c5fd}
  .header-title{font-size:18px;font-weight:700;color:#e0f2fe;letter-spacing:-0.5px}
  .header-sub{font-size:11px;color:#64748b;margin-top:2px}
  .header-right{display:flex;align-items:center;gap:10px}
  .save-ok{color:#4ade80;font-size:12px;font-weight:600;display:none}
  .badge{background:#1e3a5f;border-radius:7px;padding:5px 12px;font-size:12px;color:#93c5fd;border:1px solid #2563eb44}

  /* 탭 */
  nav{background:#0f172a;border-bottom:1px solid #1e293b;display:flex;gap:0;padding:0 20px}
  .tab-btn{background:none;border:none;cursor:pointer;padding:12px 18px;font-size:13px;font-weight:600;color:#64748b;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
  .tab-btn.active{color:#93c5fd;border-bottom:2px solid #3b82f6}

  /* 메인 */
  main{padding:18px 20px;max-width:1400px;margin:0 auto}

  /* 툴바 */
  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .toolbar input,.toolbar select{background:#1e293b;border:1px solid #334155;border-radius:7px;color:#e2e8f0;padding:8px 12px;font-size:13px;outline:none;font-family:inherit}
  .toolbar input{flex:1 1 200px}
  .btn{border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-primary{background:#1d4ed8;color:#fff}
  .btn-primary:hover{background:#2563eb}
  .btn-success{background:#15803d;color:#fff}
  .btn-success:hover{background:#16a34a}
  .btn-warn{background:#b45309;color:#fff}
  .btn-warn:hover{background:#d97706}
  .btn-danger{background:#7f1d1d22;border:1px solid #ef444455;color:#ef4444}
  .btn-danger:hover{background:#7f1d1d44}
  .btn-ghost{background:none;border:1px solid #334155;color:#94a3b8}
  .btn-ghost:hover{border-color:#64748b;color:#e2e8f0}

  /* 신자 테이블 */
  .tbl-head{display:grid;grid-template-columns:36px 72px 64px 110px 120px 86px 64px 90px 90px 1fr;gap:5px;padding:5px 8px;color:#475569;font-size:11px;font-weight:700;border-bottom:1px solid #1e293b;margin-bottom:3px}
  .tbl-row{display:grid;grid-template-columns:36px 72px 64px 110px 120px 86px 64px 90px 90px 1fr;gap:5px;padding:7px 8px;border-radius:7px;cursor:pointer;background:#1e293b;border:1px solid transparent;transition:border-color .15s;align-items:center;margin-bottom:2px}
  .tbl-row:hover{border-color:#3b82f6}
  .tbl-row.dimmed{opacity:.55}
  .tbl-row .num{color:#475569;font-size:11px}
  .tbl-row .rel-cell{font-size:11px;color:#94a3b8}
  .tbl-row .name-cell{font-weight:600}
  .tbl-row .name-head{color:#93c5fd}
  .tbl-row .baptism-cell{font-size:12px;color:#94a3b8}
  .tbl-row .phone-cell{font-size:12px}
  .tbl-row .birth-cell{font-size:11px;color:#64748b}
  .tbl-row .feast-cell{font-size:11px;color:#f59e0b}
  .tbl-row .dong-cell{font-size:11px;color:#94a3b8}
  .tbl-row .head-cell{font-size:12px}

  /* 태그 */
  .tag{display:inline-block;border-radius:5px;font-size:10px;padding:1px 7px;font-weight:600;white-space:nowrap}

  /* 모달 */
  .modal-bg{position:fixed;inset:0;background:#000b;display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
  .modal-bg.open{display:flex}
  .modal{background:#1e293b;border-radius:14px;padding:24px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;border:1px solid #334155}
  .modal-title{font-size:17px;font-weight:700;color:#93c5fd;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
  .close-btn{background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;line-height:1}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group.full{grid-column:1/-1}
  .form-group label{font-size:11px;color:#64748b;font-weight:700;letter-spacing:.3px}
  .form-group input,.form-group select,.form-group textarea{background:#0f172a;border:1px solid #334155;border-radius:7px;color:#e2e8f0;padding:8px 10px;font-size:13px;outline:none;font-family:inherit;width:100%}
  .form-group textarea{min-height:80px;resize:vertical}
  .modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:8px}

  /* SMS 탭 레이아웃 */
  .sms-layout{display:grid;grid-template-columns:260px 1fr;gap:18px}
  .sms-list .sms-item{padding:11px 13px;border-radius:7px;margin-bottom:5px;cursor:pointer;background:#1e293b;border:1px solid #1e293b;font-size:13px;font-weight:600;color:#e2e8f0;transition:all .15s}
  .sms-list .sms-item.active{background:#1d4ed822;border-color:#3b82f6;color:#93c5fd}
  .sms-preview{margin-top:14px;background:#1e293b;border-radius:9px;padding:13px;border:1px solid #334155}
  .sms-preview-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .sms-preview-label{color:#64748b;font-size:11px;font-weight:700;letter-spacing:.5px}
  .sms-text{color:#94a3b8;font-size:12px;white-space:pre-wrap;line-height:1.7}
  .sms-textarea{width:100%;min-height:160px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:12px;padding:9px;resize:vertical;outline:none;font-family:inherit}

  /* 반응 테이블 */
  .resp-head{display:grid;grid-template-columns:36px 64px 110px 120px 160px;gap:5px;padding:5px 8px;color:#475569;font-size:11px;font-weight:700;border-bottom:1px solid #1e293b;margin-bottom:3px}
  .resp-row{display:grid;grid-template-columns:36px 64px 110px 120px 160px;gap:5px;padding:6px 8px;border-radius:7px;background:#1e293b;align-items:center;margin-bottom:2px}
  .resp-row select{background:#0f172a;border:1px solid #334155;border-radius:6px;padding:4px 7px;font-size:12px;outline:none;width:100%;font-family:inherit}
  .resp-scroll{max-height:calc(100vh - 250px);overflow-y:auto}

  /* 통계 */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
  .stat-card{background:#1e293b;border-radius:11px;padding:18px 16px}
  .stat-card .stat-num{font-size:30px;font-weight:700}
  .stat-card .stat-label{color:#64748b;font-size:12px;margin-top:4px}
  .sms-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:22px}
  .sms-stat-card{background:#1e293b;border-radius:10px;padding:15px}
  .sms-stat-title{font-weight:700;color:#93c5fd;font-size:13px;margin-bottom:11px}
  .bar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .bar-bg{height:5px;background:#1e293b;border-radius:3px;width:80px;position:relative;overflow:hidden}
  .bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:3px}
  .note-stat-grid{display:flex;flex-wrap:wrap;gap:10px}
  .note-card{border-radius:9px;padding:11px 16px}
  .note-card .n-num{font-size:22px;font-weight:700}
  .note-card .n-label{font-size:11px;margin-top:2px}

  /* JSON import/export 영역 */
  .io-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .section-label{color:#64748b;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:10px;margin-top:18px}
  .section-label:first-child{margin-top:0}

  /* 반응 빠른 배지 */
  .resp-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}

  input[type=file]{display:none}

  /* 스크롤바 */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#0f172a}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <div class="header-cross">✟</div>
    <div>
      <div class="header-title">교하성당 9-2구역</div>
      <div class="header-sub">교적관리 시스템 · 남성신자 명단</div>
    </div>
  </div>
  <div class="header-right">
    <span class="save-ok" id="saveOk">✓ 저장됨</span>
    <div class="badge" id="totalBadge">총 0명</div>
  </div>
</div>

<!-- 탭 -->
<nav>
  <button class="tab-btn active" onclick="switchTab('members')">👥 신자명단</button>
  <button class="tab-btn" onclick="switchTab('sms')">📨 문자관리</button>
  <button class="tab-btn" onclick="switchTab('stats')">📊 현황통계</button>
</nav>

<main>

  <!-- ══ 신자명단 탭 ══════════════════════════════════════════ -->
  <div id="tab-members">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="이름, 세례명, 동호수, 전화 검색..." oninput="renderMembers()">
      <select id="filterNote" onchange="renderMembers()">
        <option value="전체">전체 비고</option>
        <option value="비고없음">비고없음</option>
        <option value="전출">전출</option>
        <option value="요양원">요양원</option>
        <option value="연락처불명">연락처불명</option>
        <option value="9-2구역장">9-2구역장</option>
        <option value="9-2총무">9-2총무</option>
        <option value="단톡방초대허가">단톡방초대허가</option>
      </select>
      <button class="btn btn-primary" onclick="openAddModal()">+ 신자추가</button>
      <button class="btn btn-success" onclick="exportJSON()">⬇ JSON 내보내기</button>
      <button class="btn btn-warn" onclick="document.getElementById('importFile').click()">⬆ JSON 가져오기</button>
      <input type="file" id="importFile" accept=".json" onchange="importJSON(event)">
    </div>

    <div class="tbl-head">
      <div>번호</div><div>가족관계</div><div>성명</div><div>세례명</div><div>휴대전화</div><div>생년월일</div><div>축일</div><div>동-호수</div><div>세대주</div><div>비고</div>
    </div>
    <div id="memberList"></div>
  </div>

  <!-- ══ 문자관리 탭 ══════════════════════════════════════════ -->
  <div id="tab-sms" style="display:none">
    <div class="sms-layout">
      <!-- 왼쪽: 템플릿 목록 + 미리보기 -->
      <div>
        <div class="section-label" style="margin-top:0">문자 유형</div>
        <div class="sms-list" id="smsList"></div>

        <div class="sms-preview">
          <div class="sms-preview-head">
            <span class="sms-preview-label">문자 내용</span>
            <button class="btn btn-ghost" style="padding:3px 10px;font-size:11px" onclick="toggleTemplateEdit()">편집</button>
          </div>
          <div id="smsPreviewText" class="sms-text"></div>
          <textarea id="smsEditArea" class="sms-textarea" style="display:none" oninput="updateTemplate(this.value)"></textarea>
        </div>
      </div>

      <!-- 오른쪽: 반응 체크 -->
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="section-label" style="margin-top:0" id="smsRespTitle">반응 현황</div>
          <div class="resp-badges" id="respBadges"></div>
        </div>
        <div class="resp-head">
          <div>번호</div><div>성명</div><div>세례명</div><div>전화번호</div><div>반응상태</div>
        </div>
        <div class="resp-scroll" id="smsRespList"></div>
      </div>
    </div>
  </div>

  <!-- ══ 통계 탭 ════════════════════════════════════════════ -->
  <div id="tab-stats" style="display:none">
    <div class="section-label">핵심 현황</div>
    <div class="stat-grid" id="statGrid"></div>

    <div class="section-label">문자별 반응 집계</div>
    <div class="sms-stat-grid" id="smsStat"></div>

    <div class="section-label">비고별 현황</div>
    <div class="note-stat-grid" id="noteStat"></div>
  </div>

</main>

<!-- ══ 편집 모달 ══════════════════════════════════════════════ -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">신자 정보 편집</span>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>가족관계</label><input id="f-rel" placeholder="세대주, 자(아들), 배우자 등"></div>
      <div class="form-group"><label>성명 *</label><input id="f-name"></div>
      <div class="form-group"><label>세례명</label><input id="f-baptism"></div>
      <div class="form-group"><label>휴대전화</label><input id="f-phone" placeholder="010-0000-0000"></div>
      <div class="form-group"><label>생년월일</label><input id="f-birth" placeholder="YYYY-MM-DD"></div>
      <div class="form-group"><label>축일 (MM/DD)</label><input id="f-feast" placeholder="예) 07/03"></div>
      <div class="form-group"><label>동-호수</label><input id="f-dong" placeholder="예) 915-201"></div>
      <div class="form-group"><label>세대주</label><input id="f-head"></div>
      <div class="form-group"><label>세대주 연락처</label><input id="f-headPhone"></div>
      <div class="form-group full">
        <label>비고</label>
        <select id="f-note">
          <option value="">없음</option>
          <option value="전출">전출</option>
          <option value="요양원">요양원</option>
          <option value="연락처불명">연락처불명</option>
          <option value="9-2구역장">9-2구역장</option>
          <option value="9-2총무">9-2총무</option>
          <option value="단톡방초대허가">단톡방초대허가</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteCurrentMember()">삭제</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveModal()">저장</button>
      </div>
    </div>
  </div>
</div>

// ══════════════════════════════════════════════════

function loadLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.members)      members      = d.members;
    if (d.smsTemplates) smsTemplates = d.smsTemplates;
    if (d.smsResponses) smsResponses = d.smsResponses;
  } catch(e) { console.warn("로드 실패", e); }
}

function saveLS() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({members, smsTemplates, smsResponses}));
    const el = document.getElementById("saveOk");
    el.style.display = "inline";
    setTimeout(() => el.style.display = "none", 1500);
  } catch(e) { console.warn("저장 실패", e); }
}

// ══════════════════════════════════════════════════
//  JSON 내보내기 / 가져오기
// ══════════════════════════════════════════════════
function exportJSON() {
  const data = {
    exportedAt: new Date().toISOString(),
    members,
    smsTemplates,
    smsResponses
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const today = new Date().toISOString().slice(0,10).replace(/-/g,"");
  a.download = `교하성당_9-2구역_${today}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.members || !Array.isArray(d.members)) { alert("올바른 JSON 파일이 아닙니다."); return; }
      if (!confirm(`JSON 파일을 가져오면 현재 데이터가 덮어씌워집니다.\n계속하시겠습니까?\n(${d.members.length}명, ${new Date(d.exportedAt||0).toLocaleString('ko-KR')} 내보낸 파일)`)) return;
      members      = d.members;
      smsTemplates = d.smsTemplates || INITIAL_SMS;
      smsResponses = d.smsResponses || {};
      saveLS();
      renderAll();
      alert("가져오기 완료!");
    } catch(err) { alert("JSON 파싱 오류: " + err.message); }
  };
  reader.readAsText(file);
  evt.target.value = ""; // reset
}

// ══════════════════════════════════════════════════
//  탭 전환
// ══════════════════════════════════════════════════
function switchTab(name) {
  ["members","sms","stats"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t===name ? "" : "none";
    document.querySelectorAll(".tab-btn")[["members","sms","stats"].indexOf(t)].classList.toggle("active", t===name);
  });
  if (name==="sms")   renderSms();
  if (name==="stats") renderStats();
}

// ══════════════════════════════════════════════════
//  태그 헬퍼
// ══════════════════════════════════════════════════
function noteTag(note) {
  if (!note) return "";
  const c = NOTE_COLORS[note] || "#6b7280";
  return `<span class="tag" style="background:${c}22;color:${c};border:1px solid ${c}44">${note}</span>`;
}
function respBadge(val) {
  const v = val || "미발송";
  const c = RESP_COLORS[v] || "#94a3b8";
  return `<span class="tag" style="background:${c}22;color:${c};border:1px solid ${c}44">${v}</span>`;
}

// ══════════════════════════════════════════════════
//  신자명단 렌더
// ══════════════════════════════════════════════════
function renderMembers() {
  const q    = document.getElementById("searchInput").value.toLowerCase();
  const fnote= document.getElementById("filterNote").value;
  const list = document.getElementById("memberList");
  document.getElementById("totalBadge").textContent = "총 " + members.length + "명";

  const filtered = members.filter(m => {
    const matchQ = !q || m.name.includes(q) || m.baptism.includes(q) || m.dong.includes(q) || (m.phone||"").includes(q);
    const matchN = fnote==="전체" || (fnote==="비고없음" ? !m.note : m.note===fnote);
    return matchQ && matchN;
  });

  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;color:#475569;padding:32px">검색 결과가 없습니다</div>`;
    return;
  }

  list.innerHTML = filtered.map(m => `
    <div class="tbl-row ${(m.note==='전출'||m.note==='요양원') ? 'dimmed':''}" onclick="openEditModal(${m.id})">
      <div class="num">${m.id}</div>
      <div class="rel-cell">${m.rel||""}</div>
      <div class="name-cell ${m.rel==='세대주'?'name-head':''}">${m.name}</div>
      <div class="baptism-cell">${m.baptism||""}</div>
      <div class="phone-cell" style="color:${m.phone?'#e2e8f0':'#475569'}">${m.phone||"-"}</div>
      <div class="birth-cell">${m.birth||""}</div>
      <div class="feast-cell">${m.feast||""}</div>
      <div class="dong-cell">${m.dong||""}</div>
      <div class="head-cell">${m.head||""}</div>
      <div>${noteTag(m.note)}</div>
    </div>`).join("");
}

// ══════════════════════════════════════════════════
//  모달
// ══════════════════════════════════════════════════
function openEditModal(id) {
  const m = members.find(x => x.id===id);
  if (!m) return;
  editingId   = id;
  isNewMember = false;
  document.getElementById("modalTitle").textContent = "신자 정보 편집";
  document.getElementById("deleteBtn").style.display = "";
  fillForm(m);
  document.getElementById("editModal").classList.add("open");
}

function openAddModal() {
  isNewMember = true;
  editingId   = null;
  document.getElementById("modalTitle").textContent = "신자 추가";
  document.getElementById("deleteBtn").style.display = "none";
  fillForm({rel:"",name:"",baptism:"",phone:"",birth:"",feast:"",dong:"",head:"",headPhone:"",note:""});
  document.getElementById("editModal").classList.add("open");
}

function fillForm(m) {
  ["rel","name","baptism","phone","birth","feast","dong","head","headPhone","note"].forEach(k => {
    const el = document.getElementById("f-"+k);
    if (el) el.value = m[k]||"";
  });
}

function closeModal() {
  document.getElementById("editModal").classList.remove("open");
}

function saveModal() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("성명을 입력하세요."); return; }
  const data = {};
  ["rel","name","baptism","phone","birth","feast","dong","head","headPhone","note"].forEach(k => {
    data[k] = document.getElementById("f-"+k).value.trim();
  });

  if (isNewMember) {
    data.id = members.length ? Math.max(...members.map(m=>m.id)) + 1 : 1;
    members.push(data);
  } else {
    const idx = members.findIndex(m => m.id===editingId);
    if (idx>=0) members[idx] = {...members[idx], ...data};
  }
  saveLS();
  renderAll();
  closeModal();
}

function deleteCurrentMember() {
  if (!confirm("정말 삭제하시겠습니까?")) return;
  members = members.filter(m => m.id!==editingId);
  saveLS();
  renderAll();
  closeModal();
}

// ══════════════════════════════════════════════════
//  문자관리 렌더
// ══════════════════════════════════════════════════
function renderSms() {
  // 왼쪽 목록
  document.getElementById("smsList").innerHTML = smsTemplates.map(t => `
    <div class="sms-item ${t.id===currentSmsId?'active':''}" onclick="selectSms('${t.id}')">${t.label}</div>`).join("");

  // 미리보기
  const tmpl = smsTemplates.find(t=>t.id===currentSmsId);
  document.getElementById("smsPreviewText").textContent = tmpl ? tmpl.text : "";
  document.getElementById("smsEditArea").value = tmpl ? tmpl.text : "";

  // 반응 현황 제목
  document.getElementById("smsRespTitle").textContent = "반응 현황 — " + (tmpl?.label||"");

  // 반응 배지
  document.getElementById("respBadges").innerHTML = Object.entries(RESP_COLORS).slice(0,5).map(([k,v]) =>
    `<span class="tag" style="background:${v}22;color:${v};border:1px solid ${v}44;font-size:10px">${k}</span>`).join("");

  // 반응 목록 (전화번호 있는 신자만)
  const withPhone = members.filter(m => m.phone);
  document.getElementById("smsRespList").innerHTML = withPhone.map(m => {
    const curVal = (smsResponses[m.id]||{})[currentSmsId] || "미발송";
    const options = RESP_OPTIONS.map(o => `<option value="${o}" ${o===curVal?"selected":""}>${o}</option>`).join("");
    const color   = RESP_COLORS[curVal] || "#94a3b8";
    return `<div class="resp-row">
      <div style="color:#475569;font-size:11px">${m.id}</div>
      <div style="font-weight:600">${m.name}</div>
      <div style="font-size:12px;color:#94a3b8">${m.baptism}</div>
      <div style="font-size:12px;color:#64748b">${m.phone}</div>
      <select style="color:${color}" onchange="setResp(${m.id},'${currentSmsId}',this.value)">${options}</select>
    </div>`;
  }).join("");
}

function selectSms(id) {
  currentSmsId    = id;
  editingTemplate = false;
  document.getElementById("smsPreviewText").style.display = "";
  document.getElementById("smsEditArea").style.display    = "none";
  renderSms();
}

function toggleTemplateEdit() {
  editingTemplate = !editingTemplate;
  document.getElementById("smsPreviewText").style.display = editingTemplate ? "none" : "";
  document.getElementById("smsEditArea").style.display    = editingTemplate ? "" : "none";
}

function updateTemplate(val) {
  const idx = smsTemplates.findIndex(t=>t.id===currentSmsId);
  if (idx>=0) smsTemplates[idx].text = val;
  document.getElementById("smsPreviewText").textContent = val;
  saveLS();
}

function setResp(memberId, smsId, val) {
  if (!smsResponses[memberId]) smsResponses[memberId] = {};
  smsResponses[memberId][smsId] = val;
  // 색상만 업데이트
  const el = event.target;
  el.style.color = RESP_COLORS[val] || "#94a3b8";
  saveLS();
}

// ══════════════════════════════════════════════════
//  통계 렌더
// ══════════════════════════════════════════════════
function renderStats() {
  const withPhone = members.filter(m => m.phone);
  const getResp = (mid, sid) => (smsResponses[mid]||{})[sid] || "미발송";

  // 핵심 수치
  const active   = Object.keys(smsResponses).filter(mid => Object.values(smsResponses[mid]).includes("1.활동중")).length;
  const moved    = Object.keys(smsResponses).filter(mid => Object.values(smsResponses[mid]).includes("2.이사")).length;
  const coldDown = Object.keys(smsResponses).filter(mid => Object.values(smsResponses[mid]).includes("3.냉담")).length;

  document.getElementById("statGrid").innerHTML = [
    {label:"전체 신자",    val:members.length,   color:"#3b82f6"},
    {label:"전화번호 보유", val:withPhone.length, color:"#22c55e"},
    {label:"활동중 응답",  val:active,            color:"#4ade80"},
    {label:"이사 응답",    val:moved,             color:"#ef4444"},
    {label:"냉담 응답",    val:coldDown,          color:"#f59e0b"},
  ].map(s => `
    <div class="stat-card" style="border:1px solid ${s.color}33">
      <div class="stat-num" style="color:${s.color}">${s.val}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join("");

  // 문자별 반응
  document.getElementById("smsStat").innerHTML = smsTemplates.map(tmpl => {
    const responses = withPhone.map(m => getResp(m.id, tmpl.id));
    const counts = {};
    RESP_OPTIONS.forEach(o => counts[o] = responses.filter(r=>r===o).length);
    const total = withPhone.length || 1;
    const rows = RESP_OPTIONS.filter(o=>o!=="미발송").map(o => {
      const c = RESP_COLORS[o]||"#94a3b8";
      const pct = Math.round((counts[o]/total)*100);
      return `<div class="bar-row">
        <span class="tag" style="background:${c}22;color:${c};border:1px solid ${c}44;font-size:10px">${o}</span>
        <div style="display:flex;align-items:center;gap:7px">
          <div class="bar-bg" style="background:${c}22">
            <div class="bar-fill" style="background:${c};width:${pct}%"></div>
          </div>
          <span style="color:#e2e8f0;font-size:13px;font-weight:600;min-width:18px;text-align:right">${counts[o]}</span>
        </div>
      </div>`;
    }).join("");
    return `<div class="sms-stat-card">
      <div class="sms-stat-title">${tmpl.label}</div>
      ${rows}
      <div style="border-top:1px solid #334155;padding-top:7px;margin-top:5px;display:flex;justify-content:space-between;color:#64748b;font-size:11px">
        <span>미발송</span><span>${counts["미발송"]}</span>
      </div>
    </div>`;
  }).join("");

  // 비고별
  document.getElementById("noteStat").innerHTML = Object.entries(NOTE_COLORS).map(([k,v]) => {
    const cnt = members.filter(m=>m.note===k).length;
    if (!cnt) return "";
    return `<div class="note-card" style="background:${v}11;border:1px solid ${v}33">
      <div class="n-num" style="color:${v}">${cnt}</div>
      <div class="n-label" style="color:${v}99">${k}</div>
    </div>`;
  }).join("");
}

// ══════════════════════════════════════════════════
//  전체 렌더
// ══════════════════════════════════════════════════
function renderAll() {
  renderMembers();
  if (document.getElementById("tab-sms").style.display !== "none") renderSms();
  if (document.getElementById("tab-stats").style.display !== "none") renderStats();
}

// ══════════════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════════════
loadLS();
renderAll();
</script>
</body>
</html>
